log:
  level: debug

plugins:
  - tag: default_cache
    type: cache
    args:
      size: 1024
      lazy_cache_ttl: 86400

  - tag: cn_forward
    type: forward
    args:
      concurrent: 2
      upstreams:
        # - tag: alidns
        #   addr: https://223.5.5.5/dns-query
        - tag: dnspod
          addr: https://doh.pub/dns-query
          dial_addr: "120.53.53.53"
        - tag: "360"
          addr: https://doh.360.cn/dns-query
          bootstrap: "8.8.8.8"
  - tag: non_cn_forward_with_proxy
    type: forward
    args:
      concurrent: 2
      upstreams:
        - tag: google
          addr: https://8.8.8.8/dns-query
          socks5: 127.0.0.1:1081
        - tag: cloudflare
          addr: https://1.1.1.1/dns-query
          socks5: 127.0.0.1:1081
  - tag: non_cn_forward_with_fallback
    type: fallback
    args:
      primary: non_cn_forward_with_proxy
      secondary: cn_forward
      threshold: 1000
      always_standby: false

  - tag: cn_forward_sequence
    type: sequence
    args:
      - exec: $cn_forward
      - exec: debug_print
  - tag: non_cn_forward_sequence
    type: sequence
    args:
      - exec: $non_cn_forward_with_fallback
      - exec: debug_print
  - tag: sysu_forward_sequence
    type: sequence
    args:
      - exec: forward 10.8.8.8 10.8.4.4
      - exec: debug_print

  - tag: pre_query
    type: sequence
    args:
      - exec: query_summary
      - exec: $default_cache
      - matches:
          - has_resp
        exec: accept
  - tag: default_query
    type: sequence
    args:
      - matches:
          - "qname &geosite-cn.txt &gfwlist-whitelist.txt"
        exec: goto cn_forward_sequence
      - matches:
          - "qname &gfwlist.txt"
        exec: goto non_cn_forward_sequence
      - exec: $cn_forward
  - tag: default_entry
    type: sequence
    args:
      - exec: jump pre_query
      - exec: jump default_query
  - tag: sysu_entry
    type: sequence
    args:
      - exec: jump pre_query
      - matches:
          - qname sysu.edu.cn
        exec: goto sysu_forward_sequence
      - exec: jump default_query

  - tag: default_udp_server
    type: udp_server
    args:
      entry: default_entry
      listen: 127.0.0.1:53
  - tag: default_tcp_server
    type: tcp_server
    args:
      entry: default_entry
      listen: 127.0.0.1:53
  - tag: sysu_udp_server
    type: udp_server
    args:
      entry: sysu_entry
      listen: 127.0.1.0:53
  - tag: sysu_tcp_server
    type: tcp_server
    args:
      entry: sysu_entry
      listen: 127.0.1.0:53

api:
  http: 127.0.2.1:80
